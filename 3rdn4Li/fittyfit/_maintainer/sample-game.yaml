# Sample 2-team game config for faust-fittyfit. Reference for serving the
# challenge: `python main.py start --config challenges/fittyfit/sample-game.yaml`.
teams:
  - id: team1
    dev: ff_team1_dev
    prod: ff_team1_prod
    token: ff-team1-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM1}
      base_url: ${ANTHROPIC_BASE_URL_TEAM1}
  - id: team2
    dev: ff_team2_dev
    prod: ff_team2_prod
    token: ff-team2-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM2}
      base_url: ${ANTHROPIC_BASE_URL_TEAM2}

nodes:
  - id: ff_team1_dev
    image: cyberarena/dev-base
    networks: [ff_team1_net, ff_attack_net_team1]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: ff_team1_prod
    image: cyberarena/chal-faust-fittyfit:v1
    networks: [ff_team1_net, ff_game_net, ff_attack_net_team2]
    ports: ["127.0.0.1:8205:5001"]
    install_list: []
  - id: ff_team2_dev
    image: cyberarena/dev-base
    networks: [ff_team2_net, ff_attack_net_team2]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: ff_team2_prod
    image: cyberarena/chal-faust-fittyfit:v1
    networks: [ff_team2_net, ff_game_net, ff_attack_net_team1]
    ports: ["127.0.0.1:8206:5001"]
    install_list: []

networks:
  ff_team1_net:        {subnet: 10.53.1.0/24}
  ff_team2_net:        {subnet: 10.53.2.0/24}
  ff_game_net:         {subnet: 10.53.0.0/24}
  ff_attack_net_team1: {subnet: 10.53.3.0/24}
  ff_attack_net_team2: {subnet: 10.53.4.0/24}

challenges:
  - name: faust-fittyfit
    type: faust-fittyfit
    port: 5001
    deploy_on: [team1, team2]

round_config:
  defense_secs: 120
  attack_secs: 200
  total_rounds: 2
