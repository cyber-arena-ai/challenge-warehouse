# Sample 2-team game config for faust-chat-app. Reference for serving the
# challenge: `python main.py start --config challenges/chat_app/sample-game.yaml`.
teams:
  - id: team1
    dev: chat_team1_dev
    prod: chat_team1_prod
    token: chat-team1-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM1}
      base_url: ${ANTHROPIC_BASE_URL_TEAM1}
  - id: team2
    dev: chat_team2_dev
    prod: chat_team2_prod
    token: chat-team2-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM2}
      base_url: ${ANTHROPIC_BASE_URL_TEAM2}

nodes:
  - id: chat_team1_dev
    image: cyberarena/dev-base
    networks: [chat_team1_net, chat_attack_net_team1]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: chat_team1_prod
    image: cyberarena/chal-faust-chat-app:v1
    networks: [chat_team1_net, chat_game_net, chat_attack_net_team2]
    ports: ["127.0.0.1:8201:5000"]
    install_list: []
  - id: chat_team2_dev
    image: cyberarena/dev-base
    networks: [chat_team2_net, chat_attack_net_team2]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: chat_team2_prod
    image: cyberarena/chal-faust-chat-app:v1
    networks: [chat_team2_net, chat_game_net, chat_attack_net_team1]
    ports: ["127.0.0.1:8202:5000"]
    install_list: []

networks:
  chat_team1_net:        {subnet: 10.51.1.0/24}
  chat_team2_net:        {subnet: 10.51.2.0/24}
  chat_game_net:         {subnet: 10.51.0.0/24}
  chat_attack_net_team1: {subnet: 10.51.3.0/24}
  chat_attack_net_team2: {subnet: 10.51.4.0/24}

challenges:
  - name: faust-chat-app
    type: faust-chat-app
    port: 5000
    deploy_on: [team1, team2]

round_config:
  defense_secs: 120
  attack_secs: 200
  total_rounds: 2
