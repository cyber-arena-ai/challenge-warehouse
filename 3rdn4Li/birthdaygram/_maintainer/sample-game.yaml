# Sample 2-team game config for faust-birthdaygram. Reference for serving the
# challenge: `python main.py start --config challenges/birthdaygram/sample-game.yaml`.
teams:
  - id: team1
    dev: bd_team1_dev
    prod: bd_team1_prod
    token: bd-team1-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM1}
      base_url: ${ANTHROPIC_BASE_URL_TEAM1}
  - id: team2
    dev: bd_team2_dev
    prod: bd_team2_prod
    token: bd-team2-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM2}
      base_url: ${ANTHROPIC_BASE_URL_TEAM2}

nodes:
  - id: bd_team1_dev
    image: cyberarena/dev-base
    networks: [bd_team1_net, bd_attack_net_team1]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: bd_team1_prod
    image: cyberarena/chal-faust-birthdaygram:v1
    networks: [bd_team1_net, bd_game_net, bd_attack_net_team2]
    ports: ["127.0.0.1:8207:3000"]
    install_list: []
  - id: bd_team2_dev
    image: cyberarena/dev-base
    networks: [bd_team2_net, bd_attack_net_team2]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: bd_team2_prod
    image: cyberarena/chal-faust-birthdaygram:v1
    networks: [bd_team2_net, bd_game_net, bd_attack_net_team1]
    ports: ["127.0.0.1:8208:3000"]
    install_list: []

networks:
  bd_team1_net:        {subnet: 10.54.1.0/24}
  bd_team2_net:        {subnet: 10.54.2.0/24}
  bd_game_net:         {subnet: 10.54.0.0/24}
  bd_attack_net_team1: {subnet: 10.54.3.0/24}
  bd_attack_net_team2: {subnet: 10.54.4.0/24}

challenges:
  - name: faust-birthdaygram
    type: faust-birthdaygram
    port: 3000
    deploy_on: [team1, team2]

round_config:
  defense_secs: 120
  attack_secs: 200
  total_rounds: 2
