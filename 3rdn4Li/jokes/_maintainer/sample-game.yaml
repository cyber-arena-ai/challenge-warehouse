# Sample 2-team game config for faust-jokes. Reference for serving the
# challenge: `python main.py start --config challenges/jokes/sample-game.yaml`.
teams:
  - id: team1
    dev: jk_team1_dev
    prod: jk_team1_prod
    token: jk-team1-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM1}
      base_url: ${ANTHROPIC_BASE_URL_TEAM1}
  - id: team2
    dev: jk_team2_dev
    prod: jk_team2_prod
    token: jk-team2-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM2}
      base_url: ${ANTHROPIC_BASE_URL_TEAM2}

nodes:
  - id: jk_team1_dev
    image: cyberarena/dev-base
    networks: [jk_team1_net, jk_attack_net_team1]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: jk_team1_prod
    image: cyberarena/chal-faust-jokes:v1
    networks: [jk_team1_net, jk_game_net, jk_attack_net_team2]
    ports: ["127.0.0.1:8203:5000"]
    install_list: []
  - id: jk_team2_dev
    image: cyberarena/dev-base
    networks: [jk_team2_net, jk_attack_net_team2]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: jk_team2_prod
    image: cyberarena/chal-faust-jokes:v1
    networks: [jk_team2_net, jk_game_net, jk_attack_net_team1]
    ports: ["127.0.0.1:8204:5000"]
    install_list: []

networks:
  jk_team1_net:        {subnet: 10.52.1.0/24}
  jk_team2_net:        {subnet: 10.52.2.0/24}
  jk_game_net:         {subnet: 10.52.0.0/24}
  jk_attack_net_team1: {subnet: 10.52.3.0/24}
  jk_attack_net_team2: {subnet: 10.52.4.0/24}

challenges:
  - name: faust-jokes
    type: faust-jokes
    port: 5000
    deploy_on: [team1, team2]

round_config:
  defense_secs: 120
  attack_secs: 200
  total_rounds: 2
