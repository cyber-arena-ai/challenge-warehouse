card:
  tagline: Gradio /component_server calls move_resource_to_block_cache to leak any file
  summary: Gradio 4.11.0 exposes /component_server, which invokes an arbitrary method on a
    component with attacker-controlled args. Calling move_resource_to_block_cache(<path>)
    copies any server-readable file into the served cache, and the returned path is then fetched
    via /file=. This grants arbitrary file read, including the flag at /opt/secret/flag.txt.
  attack: POST /component_server invoking move_resource_to_block_cache on /opt/secret/flag.txt,
    then GET /file= to retrieve it.
  defense: Edit /srv/challenge/gradio/routes.py to restrict component_server to safe methods
    (the 4.13 fix) and restart_service.
