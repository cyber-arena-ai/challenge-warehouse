card:
  tagline: Forge a VIP flugschein JWT to read the flag hidden in a flight's VIP boarding info
  summary: A German Flask flight-booking app on HTTP 5000 issues booking tickets as JWTs passed
    back via `?flugschein=`. A flight's VIP boarding-info is only shown to requests carrying
    a valid VIP ticket scoped to that flight, and the flag lives in the VIP info of a flight
    created by a fixed public user. Weaknesses in the ticket issue/verify and VIP-scope check
    let an attacker obtain unauthorized VIP access.
  attack: Forge or replay a VIP-scoped `flugschein` JWT for the target flight and view its
    VIP boarding info to read the flag.
  defense: Harden ticket issuance/verification and the VIP check so VIP info requires a properly-issued,
    properly-scoped, unforgeable ticket, then restart_service.
