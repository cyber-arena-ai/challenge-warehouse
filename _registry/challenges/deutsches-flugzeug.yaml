  source_intro: 'saarCTF 2024 deutsches-flugzeug — a German-language Flask flight-booking
    webapp on HTTP 5000 (signup/login, browse flights, create a flight, book a flight, view
    a flight). Booking issues a ticket (a JWT passed back as `?flugschein=`), and a flight''s
    VIP boarding-info field is only rendered to a request carrying a valid VIP ticket scoped
    to that flight. The flag is stored in the VIP info of a flight created by a fixed public
    user. Reading it requires obtaining VIP access to that flight through a weakness in the
    ticket flow — the challenge is left as self-discovery and may have more than one weakness.
    Defense: harden the ticket issue/verify and VIP check so VIP info can''t be read without
    a properly-issued, properly-scoped, unforgeable ticket, keeping the checker green, then
    restart_service.'
