card:
  tagline: Abuse Yii's DI container via __class to smuggle a PHP payload as www-data
  summary: Craft CMS 5.6.16 on PHP 8.3/Apache exposes an unauthenticated RCE in the image-transform
    endpoint /index.php?p=actions/assets/generate-transform. A crafted __class parameter abuses
    Yii's dependency-injection container to make yii\rbac\PhpManager include() an attacker-controlled
    PHP session file, executing arbitrary commands.
  attack: POST the generate-transform endpoint with a __class DI-injection payload pointing
    PhpManager at a session file, then read /flag as www-data.
  defense: Edit web/index.php (/srv/challenge/craft_cms/index.php) to reject the DI-injection
    payload and call restart_service.
