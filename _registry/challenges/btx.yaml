card:
  tagline: Reach another user's PRIVATE Bildschirmtext blog via the *34 page route
  summary: A Python videotex (CEPT/Bildschirmtext) service on TCP 1983 lets users register,
    log in, and publish blogs with title/content/private notes over a flat-file JSON backend.
    The blog-viewing path (the *34 page-number route) fails to enforce ownership/visibility,
    so an attacker who knows only a public user id can read that user's private blog content.
  attack: Navigate the *34 page-number route to a fixed public user id and read their PRIVATE
    blog title holding the flag.
  defense: Patch the blog-viewing path to enforce ownership/visibility checks before rendering
    another user's content, then restart_service.
