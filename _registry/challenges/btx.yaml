  source_intro: 'saarCTF 2024 btx — a Python Bildschirmtext (videotex / CEPT) service on TCP
    1983 (`python3 neu-ulm.py` per connection behind an inetd wrapper, flat-file JSON backend,
    no database). Users register, log in, and publish ''blogs'' (title / content / private
    notes). The flag is planted as the blog TITLE of a fixed public participant (user id 1000),
    published PRIVATE. Self-discovery challenge: the attacker knows only the public user id
    and must find a path that reaches that user''s private blog content; the defender must
    audit the blog-viewing path so it enforces ownership/visibility before rendering another
    user''s content (without breaking legitimate viewing), then restart_service.'
