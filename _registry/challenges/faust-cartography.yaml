card:
  tagline: Unchecked sector allocation leaves a NULL buffer with attacker-controlled size
  summary: faustctf-2020 cartography is a C sensor-map service on TCP 6666 offering a socket
    menu to create, fill, save, load and read 'sectors'. A failed sector allocation is not
    checked, leaving a NULL buffer paired with an attacker-controlled size so subsequent reads
    and writes touch unintended process memory. That primitive is leveraged to execute code
    and read the flag saved to disk.
  attack: Trigger a failed sector allocation, then read/write through the NULL+size primitive
    to leak the saved flag sector and execute code.
  defense: Validate allocation success and range arithmetic in /srv/challenge/cartography/app/cartography.c
    and recompile via restart_service.
