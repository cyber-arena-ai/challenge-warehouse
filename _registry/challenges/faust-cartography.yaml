  source_intro: 'faustctf-2020 cartography — C sensor-map service on TCP 6666 (menu over a
    socket). The flag is stored as a saved ''sector'' on disk. The vulnerability is an unchecked
    allocation failure: a failed sector allocation leaves a NULL buffer paired with an attacker-controlled
    size, allowing subsequent sector reads and writes to access unintended process memory.
    Defense: validate allocation success and range arithmetic in /srv/challenge/cartography/app/cartography.c;
