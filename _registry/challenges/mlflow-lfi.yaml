  source_intro: 'mlflow/mlflow 2.1.1 — artifact-download LFI (CVE-2023-1177). The tracking
    server (HTTP :5000) validates the artifact `?path=` param but NOT the artifact root it
    joins onto, and that root is attacker-controlled (a model version''s `source`). An unauthenticated
    client points the root at a local dir and reads an arbitrary file. Flag lives at /opt/secret/flag.txt
    (mode 600, owned by the mlflow runtime user). Attack: model-version source="file://%00/opt/secret/"
    + /model-versions/get-artifact. Defense: validate the artifact root (reject non-proxied
    local roots) in /srv/challenge/mlflow/server/handlers.py, restart_service.'
