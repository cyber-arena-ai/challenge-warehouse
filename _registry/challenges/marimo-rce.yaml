  source_intro: 'marimo 0.20.4 — unauthenticated RCE via the /terminal/ws WebSocket (CVE-2026-39987).
    The terminal endpoint exposes an interactive PTY shell without the validate_auth() check
    every other WebSocket performs, so an unauthenticated client gets a shell as the marimo
    user even though the server is token-protected. Flag at /opt/secret/flag.txt (mode 600,
    marimo user). Attack: WS /terminal/ws -> `cat /opt/secret/flag.txt`. Defense: add validate_auth
    (or disable) the terminal handler in /srv/challenge/marimo/_server/api/endpoints/terminal.py,
    restart_service.'
