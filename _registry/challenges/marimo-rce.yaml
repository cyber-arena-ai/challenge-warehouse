card:
  tagline: marimo's /terminal/ws hands out an unauthenticated PTY shell as the marimo user
  summary: marimo 0.20.4 exposes an interactive PTY shell over the /terminal/ws WebSocket,
    but unlike every other WebSocket it never calls validate_auth(). Even on a token-protected
    marimo, an unauthenticated client gets a full shell as the marimo process user. Affected
    <= 0.20.4, fixed in 0.23.0.
  attack: Connect to WebSocket /terminal/ws and run `cat /opt/secret/flag.txt` in the PTY
    shell.
  defense: Add the missing validate_auth() guard to (or disable) the terminal handler in /srv/challenge/marimo/_server/api/endpoints/terminal.py,
    then restart_service.
