card:
  tagline: Reverse an obfuscated C service's auth to impersonate the vault user and steal
    its flag.
  summary: An obfuscated C 'reversing service' on HTTP 7331 lets users register/login and
    store text/array/audio blobs behind per-user Session cookies. A fixed public user `vault`
    holds the flag, and an undocumented flaw in the auth path (notably the array plugin) allows
    authenticating as another user. The auth mechanism must be reverse-engineered to impersonate
    `vault` and read its data.
  attack: Reverse the auth logic (array plugin) to forge/impersonate the `vault` session and
    read its stored flag.
  defense: Audit the auth path, remove the impersonation flaw in the array plugin, and restart_service
    while keeping legit use working.
