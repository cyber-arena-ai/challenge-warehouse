card:
  tagline: Read another gym-bro's flag-bearing NFT PDF by abusing the file-serving authz
  summary: A Flask 'NFT' gym app on TCP 5001 lets users upload PDFs that are turned into generated
    'NFT' PDFs, one of which embeds the flag under a victim user. The NFT file-serving and
    PDF handling lack proper authorization/path checks, so an attacker can fetch other users'
    NFT PDFs. Defense involves patching the app under /srv/challenge/fittyfit/app/ and respawning
    gunicorn.
  attack: Access another user's generated NFT PDF via the file-serving path/authz flaw to
    read the embedded flag.
  defense: Enforce per-user ownership checks and sanitize NFT file paths in the app, then
    call restart_service to respawn gunicorn.
