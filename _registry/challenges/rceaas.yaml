card:
  tagline: Break out of a Rust fake-Windows shell jail on TCP 1835 to read another user's
    flag
  summary: A Rust 'RCE as a Service' service on TCP 1835 emulates a Windows C:/> shell (mkdir/dir/cd/type/copy/mklink/echo/...)
    confining each user to ./jails/<username>/. Weak path handling in the jail command layer
    lets one user traverse or symlink out of their jail. The flag lives as the file `flag`
    in a fixed well-known user's jail.
  attack: Abuse mklink/copy/cd path handling to escape your jail and `type` the flag file
    in another user's jail.
  defense: Harden path normalization/canonicalization in app/src/jail/command.rs so users
    stay confined, then restart_service.
