card:
  tagline: Recover a connection's secret challenge without the RSA key to read another user's
    review.
  summary: A Java 'magic 8-ball / review oracle' on TCP 17280 backed by MariaDB stores reviews
    with per-review RSA keypairs and gates GETREVIEW behind a per-connection secret challenge.
    The flag is planted as another user's REVIEW; reading it requires supplying the matching
    secret challenge. The intended attack recovers that secret without possessing the RSA
    private key by abusing how the challenge is generated and how review access is authorised.
  attack: Recover the per-connection secret challenge (predictable/leaky generation) and call
    GETREVIEW <id>:<challenge> on the victim's flag review.
  defense: Audit /srv/challenge/8-bit-oracle/app/_8BitOracle/src/ to use unpredictable challenge
    generation and proper access authorisation, then restart_service.
