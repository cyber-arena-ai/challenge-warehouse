card:
  tagline: follow_symlinks=True on aiohttp 3.9.1 turns /static/ into arbitrary file read
  summary: An aiohttp 3.9.1 static file server registers its /static/ route with follow_symlinks=True,
    which on aiohttp <= 3.9.1 skips the path-containment check. A GET /static/../../../<path>
    request therefore reads any file the server process can access, with no symlink required.
  attack: GET --path-as-is /static/../../../../opt/secret/flag.txt reads the mode-600 flag.
  defense: Edit /srv/challenge/server.py to drop follow_symlinks=True (or validate the resolved
    path stays under the static root) and restart_service.
