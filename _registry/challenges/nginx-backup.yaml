card:
  tagline: nginx-ui hands you an encrypted backup and the AES key to open it
  summary: nginx-ui v2.3.2 exposes an unauthenticated GET /api/backup endpoint that returns
    an AES-256-CBC encrypted archive while leaking the decryption key and IV (base64) in the
    X-Backup-Security response header. Decrypting the archive yields app.ini, which contains
    the planted flag.
  attack: GET /api/backup unauthenticated, read key+IV from X-Backup-Security, AES-256-CBC
    decrypt to recover app.ini flag.
  defense: Add `location /api/backup { return 403; }` to /srv/challenge/nginx_backup/proxy.conf
    and reload nginx via restart_service.
