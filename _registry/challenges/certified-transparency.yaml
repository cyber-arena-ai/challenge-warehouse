  source_intro: 'saarCTF 2024 certified-transparency — a Go certificate-transparency-style
    log. Two HTTP daemons: a ''log'' on :3000 (add-entry / get-entries / sign-entry / get-sth
    / get-entry-and-proof) and a ''monitor'' on :3001 (claim-private / claim-public / websocket
    /watch). Storage is an embedded BadgerDB (no external DB). The flag is planted in the
    data_public/data_private fields of a log entry owned by a named public owner. Reading
    a private entry requires a validly-signed tree head plus a Merkle proof; the intended
    attack is a crypto flaw in how those signatures/proofs are verified, letting an attacker
    authenticate a tree head they shouldn''t and claim ANY entry''s data_public with no owner
    key (blind). Defense: audit the tree-head signature/checksum verification (Go source under
    pkg/) and harden it so all fields are authenticated without breaking legit use, then restart_service.'
