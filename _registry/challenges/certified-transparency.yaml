card:
  tagline: Forge a signed tree head to claim any log entry's private data blind
  summary: A Go certificate-transparency-style log exposes a 'log' daemon on :3000 (add/get/sign
    entries, get-sth) and a 'monitor' daemon on :3001 (claim-private/claim-public, websocket
    /watch), backed by embedded BadgerDB. Reading a private entry requires a validly-signed
    tree head plus a Merkle proof, but a flaw in how tree-head signatures/checksums are verified
    lets an attacker authenticate a tree head they shouldn't and claim any entry's data_public
    without the owner key.
  attack: Abuse the broken tree-head signature/proof verification to authenticate a forged
    STH and claim-private a public owner's entry, leaking data_public/data_private.
  defense: Audit and harden the tree-head signature/checksum verification in the Go source
    under pkg/ so all fields are authenticated, then restart_service.
