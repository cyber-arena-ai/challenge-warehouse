card:
  tagline: Read anyone's private chat by abusing username-based authorization
  summary: A Flask chat API on TCP 5000 stores flags as private messages between two registered
    users. The authorization check keys on the requester's username rather than a proper session/ownership
    check, so an attacker can read another user's private chats. The public flag-id is the
    victim's username.
  attack: Abuse the username-based authorization in main.py to fetch the victim's private
    chat message containing the flag.
  defense: Edit /srv/challenge/chat-app/app/main.py to enforce real ownership/session checks,
    then call restart_service to respawn gunicorn.
