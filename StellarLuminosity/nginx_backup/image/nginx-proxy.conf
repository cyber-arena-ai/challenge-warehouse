# Standalone nginx reverse-proxy config for the nginx-backup challenge.
#
# Loaded with `nginx -c /arena/nginx-proxy.conf` so it is fully isolated
# from /etc/nginx/ (which nginx-ui manages for its own purposes).
#
# The defender edits /srv/challenge/nginx_backup/proxy.conf and calls
# restart_service. restart.sh validates (-t) then reloads this config.
# Any location block in proxy.conf takes precedence over the catch-all
# location / because nginx routes to the most-specific match.

pid        /var/run/nginx-proxy.pid;
error_log  /var/log/nginx-proxy-error.log warn;

events {
    worker_connections 64;
}

http {
    access_log /var/log/nginx-proxy-access.log;

    server {
        listen 9000 default_server;

        # Defender-editable restriction layer.
        # Default state: no blocks (passthrough).
        # Patched state: location /api/backup { return 403; }
        include /srv/challenge/nginx_backup/proxy.conf;

        location / {
            proxy_pass         http://127.0.0.1:9001;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }
    }
}
