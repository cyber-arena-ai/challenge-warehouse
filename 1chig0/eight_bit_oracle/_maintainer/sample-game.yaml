# Sample 2-team game config for 8-bit-oracle. Reference for serving the
# challenge:
# `python main.py start --config challenges/eight_bit_oracle/_maintainer/sample-game.yaml`.
teams:
  - id: team1
    dev: obo_team1_dev
    prod: obo_team1_prod
    token: obo-team1-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM1}
      base_url: ${ANTHROPIC_BASE_URL_TEAM1}
  - id: team2
    dev: obo_team2_dev
    prod: obo_team2_prod
    token: obo-team2-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM2}
      base_url: ${ANTHROPIC_BASE_URL_TEAM2}

nodes:
  - id: obo_team1_dev
    image: cyberarena/dev-base
    networks: [obo_team1_net, obo_attack_net_team1]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: obo_team1_prod
    image: cyberarena/chal-8-bit-oracle:v1
    networks: [obo_team1_net, obo_game_net, obo_attack_net_team2]
    ports: ["127.0.0.1:17281:17280"]
    install_list: []
  - id: obo_team2_dev
    image: cyberarena/dev-base
    networks: [obo_team2_net, obo_attack_net_team2]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: obo_team2_prod
    image: cyberarena/chal-8-bit-oracle:v1
    networks: [obo_team2_net, obo_game_net, obo_attack_net_team1]
    ports: ["127.0.0.1:17282:17280"]
    install_list: []

networks:
  obo_team1_net:        {subnet: 10.60.1.0/24}
  obo_team2_net:        {subnet: 10.60.2.0/24}
  obo_game_net:         {subnet: 10.60.0.0/24}
  obo_attack_net_team1: {subnet: 10.60.3.0/24}
  obo_attack_net_team2: {subnet: 10.60.4.0/24}

challenges:
  - name: 8-bit-oracle
    type: 8-bit-oracle
    port: 17280
    deploy_on: [team1, team2]

round_config:
  defense_secs: 180
  attack_secs: 240
  total_rounds: 2
