# reversaar: HTTP on 7331. Static web root + /api via fcgiwrap CGI + /userdata
# static file alias. Mirrors the upstream install.sh nginx site.
server {
    listen 7331 default_server;
    listen [::]:7331 default_server;

    root /home/reversaar/web;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # /api/* -> the plain-CGI binary via fcgiwrap over a unix socket. The binary
    # reads SCRIPT_NAME (the request path) to route; SCRIPT_FILENAME names the
    # CGI to exec and MUST be set before including fastcgi.conf.
    location /api {
        fastcgi_param SCRIPT_FILENAME /home/reversaar/reversaar.cgi;
        include /etc/nginx/fastcgi.conf;
        fastcgi_pass unix:/run/reversaar/reversaar.sock;
        fastcgi_read_timeout 30s;
    }

    # Stored reversed blobs, served statically (GET /api/<type>/<idx> 302-redirects
    # here with the file's uuid → /userdata/<uuid>).
    #
    # The trailing slash on BOTH the location and the alias is load-bearing: with a
    # prefix `location /userdata` (no slash) + `alias .../files/`, a request to
    # `/userdata../secret_key` matches the prefix and nginx maps it to
    # `.../data/files/../secret_key` = `.../data/secret_key`, an alias path
    # traversal out of files/ into the datastore (reads secret_key + user password
    # hashes → forge any session, bypassing the intended backdoor). `location
    # /userdata/` only matches URIs that actually start with `/userdata/`, so
    # `/userdata../` no longer matches here and falls through to `location /`
    # (404 in the web root). Do NOT drop the trailing slash.
    location /userdata/ {
        alias /home/reversaar/data/files/;
        sendfile on;
        tcp_nopush on;
    }
}
