# reversaar: HTTP on 7331. Static web root + /api via fcgiwrap CGI + /userdata
# static file alias. Mirrors the upstream install.sh nginx site.
server {
    listen 7331 default_server;
    listen [::]:7331 default_server;

    root /home/reversaar/web;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # /api/* -> the plain-CGI binary via fcgiwrap over a unix socket. The binary
    # reads SCRIPT_NAME (the request path) to route; SCRIPT_FILENAME names the
    # CGI to exec and MUST be set before including fastcgi.conf.
    location /api {
        fastcgi_param SCRIPT_FILENAME /home/reversaar/reversaar.cgi;
        include /etc/nginx/fastcgi.conf;
        fastcgi_pass unix:/run/reversaar/reversaar.sock;
        fastcgi_read_timeout 30s;
    }

    # Stored reversed blobs, served statically (GET /api/<type>/<idx> 302-redirects
    # here with the file's uuid → /userdata/<uuid>).
    #
    # SECURITY — this location must not be exploitable as an nginx `alias` path
    # traversal. `data/files/` sits inside `data/`, which also holds `users/`
    # (per-user password hashes), one dir up from the alias root; `secret_key`
    # lives a further level up. Leaking any of those lets an attacker forge a
    # `Session` HMAC for `vault` and skip the intended reverse-engineered backdoor
    # entirely (issue #49). Rather than block each traversal encoding (missing
    # trailing slash, `%2e`/`%2f`, double-encoding, backslashes, …) one at a time,
    # this uses a POSITIVE allowlist: a regex location that matches ONLY a
    # well-formed blob id and passes the captured id — never the raw URI — to
    # `alias`. Blob ids are lowercase-hex UUIDs (`uuid_unparse_lower`, array.c),
    # so `[0-9a-f-]+` cannot contain `.`, `/`, or `%`; any traversal payload fails
    # to match and falls through to `location /` (404). This kills the whole
    # alias-traversal class structurally, independent of nginx version/decoding.
    location ~ "^/userdata/(?<blob>[0-9a-f-]+)$" {
        alias /home/reversaar/data/files/$blob;
        sendfile on;
        tcp_nopush on;
    }
}
