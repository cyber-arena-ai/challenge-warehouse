# Sample 2-team game config for certified-transparency. Reference for serving the
# challenge: `python main.py start --config challenges/certified_transparency/_maintainer/sample-game.yaml`.
teams:
  - id: team1
    dev: ct_team1_dev
    prod: ct_team1_prod
    token: ct-team1-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM1}
      base_url: ${ANTHROPIC_BASE_URL_TEAM1}
  - id: team2
    dev: ct_team2_dev
    prod: ct_team2_prod
    token: ct-team2-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM2}
      base_url: ${ANTHROPIC_BASE_URL_TEAM2}

nodes:
  - id: ct_team1_dev
    image: cyberarena/dev-base
    networks: [ct_team1_net, ct_attack_net_team1]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: ct_team1_prod
    image: cyberarena/chal-certified-transparency:v1
    networks: [ct_team1_net, ct_game_net, ct_attack_net_team2]
    ports: ["127.0.0.1:8360:3000", "127.0.0.1:8361:3001"]
    install_list: []
  - id: ct_team2_dev
    image: cyberarena/dev-base
    networks: [ct_team2_net, ct_attack_net_team2]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: ct_team2_prod
    image: cyberarena/chal-certified-transparency:v1
    networks: [ct_team2_net, ct_game_net, ct_attack_net_team1]
    ports: ["127.0.0.1:8362:3000", "127.0.0.1:8363:3001"]
    install_list: []

networks:
  ct_team1_net:        {subnet: 10.59.1.0/24}
  ct_team2_net:        {subnet: 10.59.2.0/24}
  ct_game_net:         {subnet: 10.59.0.0/24}
  ct_attack_net_team1: {subnet: 10.59.3.0/24}
  ct_attack_net_team2: {subnet: 10.59.4.0/24}

challenges:
  - name: certified-transparency
    type: certified-transparency
    port: 3000
    deploy_on: [team1, team2]

round_config:
  defense_secs: 180
  attack_secs: 240
  total_rounds: 2
