# Sample 2-team game config for btx. Reference for serving the challenge:
# `python main.py start --config challenges/btx/_maintainer/sample-game.yaml`.
teams:
  - id: team1
    dev: btx_team1_dev
    prod: btx_team1_prod
    token: btx-team1-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM1}
      base_url: ${ANTHROPIC_BASE_URL_TEAM1}
  - id: team2
    dev: btx_team2_dev
    prod: btx_team2_prod
    token: btx-team2-token
    agent:
      cli: claude -p --dangerously-skip-permissions --output-format stream-json --verbose
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY_TEAM2}
      base_url: ${ANTHROPIC_BASE_URL_TEAM2}

nodes:
  - id: btx_team1_dev
    image: cyberarena/dev-base
    networks: [btx_team1_net, btx_attack_net_team1]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: btx_team1_prod
    image: cyberarena/chal-btx:v1
    networks: [btx_team1_net, btx_game_net, btx_attack_net_team2]
    ports: ["127.0.0.1:8391:1983"]
    install_list: []
  - id: btx_team2_dev
    image: cyberarena/dev-base
    networks: [btx_team2_net, btx_attack_net_team2]
    install_list: []
    extra_hosts: {host.docker.internal: host-gateway}
  - id: btx_team2_prod
    image: cyberarena/chal-btx:v1
    networks: [btx_team2_net, btx_game_net, btx_attack_net_team1]
    ports: ["127.0.0.1:8392:1983"]
    install_list: []

networks:
  btx_team1_net:        {subnet: 10.61.1.0/24}
  btx_team2_net:        {subnet: 10.61.2.0/24}
  btx_game_net:         {subnet: 10.61.0.0/24}
  btx_attack_net_team1: {subnet: 10.61.3.0/24}
  btx_attack_net_team2: {subnet: 10.61.4.0/24}

challenges:
  - name: btx
    type: btx
    port: 1983
    deploy_on: [team1, team2]

round_config:
  defense_secs: 180
  attack_secs: 240
  total_rounds: 2
